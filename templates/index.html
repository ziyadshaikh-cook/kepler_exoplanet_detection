<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kepler Exoplanet Detection</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0e1a;
            color: #e0e6f0;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2rem;
            color: #7eb8f7;
            letter-spacing: 1px;
        }

        header p {
            color: #8a97b0;
            margin-top: 8px;
            font-size: 0.95rem;
        }

        .card {
            background: #111827;
            border: 1px solid #1f2d45;
            border-radius: 12px;
            padding: 32px;
        }

        .section-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #4a90d9;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid #1f2d45;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 28px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.82rem;
            color: #8a97b0;
            font-weight: 500;
        }

        label span {
            font-size: 0.72rem;
            color: #4a6080;
            display: block;
            margin-top: 2px;
        }

        input[type="number"] {
            background: #0d1520;
            border: 1px solid #1f2d45;
            border-radius: 6px;
            padding: 10px 12px;
            color: #e0e6f0;
            font-size: 0.9rem;
            width: 100%;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #4a90d9;
        }

        .checkbox-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 28px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #0d1520;
            border: 1px solid #1f2d45;
            border-radius: 6px;
            padding: 10px 14px;
            cursor: pointer;
        }

        .checkbox-group input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #4a90d9;
            cursor: pointer;
        }

        .checkbox-group label {
            cursor: pointer;
            font-size: 0.85rem;
            color: #c0ccd8;
            margin: 0;
        }

        .checkbox-group label span {
            font-size: 0.72rem;
            color: #4a6080;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #1a4a8a;
            color: #e0f0ff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }

        .submit-btn:hover {
            background: #2260b0;
        }

        .note {
            text-align: center;
            font-size: 0.78rem;
            color: #4a6080;
            margin-top: 16px;
        }

        @media (max-width: 560px) {
            .form-grid, .checkbox-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Kepler Exoplanet Detector</h1>
            <p>Enter telescope observation measurements to classify a Kepler Object of Interest</p>
        </header>

        <div class="card">
            <form action="/predict" method="POST">

                <p class="section-title">False Positive Flags</p>
                <div class="checkbox-grid">
                    <div class="checkbox-group">
                        <input type="checkbox" name="koi_fpflag_nt" id="nt" value="1">
                        <label for="nt">Not Transit-Like <span>koi_fpflag_nt</span></label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" name="koi_fpflag_ss" id="ss" value="1">
                        <label for="ss">Stellar Eclipse <span>koi_fpflag_ss</span></label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" name="koi_fpflag_co" id="co" value="1">
                        <label for="co">Centroid Offset <span>koi_fpflag_co</span></label>
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" name="koi_fpflag_ec" id="ec" value="1">
                        <label for="ec">Ephemeris Match <span>koi_fpflag_ec</span></label>
                    </div>
                </div>

                <p class="section-title">Transit Parameters</p>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Orbital Period (days) <span>koi_period</span></label>
                        <input type="number" name="koi_period" step="any" placeholder="9.49" required>
                    </div>
                    <div class="form-group">
                        <label>Impact Parameter <span>koi_impact</span></label>
                        <input type="number" name="koi_impact" step="any" placeholder="0.15" required>
                    </div>
                    <div class="form-group">
                        <label>Transit Duration (hours) <span>koi_duration</span></label>
                        <input type="number" name="koi_duration" step="any" placeholder="2.95" required>
                    </div>
                    <div class="form-group">
                        <label>Transit Depth (ppm) <span>koi_depth</span></label>
                        <input type="number" name="koi_depth" step="any" placeholder="615.8" required>
                    </div>
                    <div class="form-group">
                        <label>Planet Radius (R⊕) <span>koi_prad</span></label>
                        <input type="number" name="koi_prad" step="any" placeholder="2.26" required>
                    </div>
                    <div class="form-group">
                        <label>Signal-to-Noise Ratio <span>koi_model_snr</span></label>
                        <input type="number" name="koi_model_snr" step="any" placeholder="35.8" required>
                    </div>
                </div>

                <p class="section-title">Stellar Parameters</p>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Effective Temperature (K) <span>koi_steff</span></label>
                        <input type="number" name="koi_steff" step="any" placeholder="5455" required>
                    </div>
                    <div class="form-group">
                        <label>Surface Gravity (log g) <span>koi_slogg</span></label>
                        <input type="number" name="koi_slogg" step="any" placeholder="4.47" required>
                    </div>
                    <div class="form-group">
                        <label>Stellar Radius (R☉) <span>koi_srad</span></label>
                        <input type="number" name="koi_srad" step="any" placeholder="0.93" required>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Analyse Object</button>
                <p class="note">Unmeasured parameters are filled with dataset medians automatically</p>
            </form>
        </div>
    </div>
</body>
</html>
