<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0e1a;
            color: #e0e6f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: #111827;
            border: 1px solid #1f2d45;
            border-radius: 12px;
            padding: 48px 40px;
            text-align: center;
            max-width: 480px;
            width: 100%;
        }

        .icon { font-size: 3.5rem; margin-bottom: 20px; }

        .result-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #4a6080;
            margin-bottom: 12px;
        }

        .result-value {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 24px;
        }

        .confirmed { color: #4ade80; }
        .false-positive { color: #f87171; }

        .confidence-label {
            font-size: 0.78rem;
            color: #4a6080;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .confidence-bar-wrap {
            background: #0d1520;
            border-radius: 100px;
            height: 10px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .confidence-bar {
            height: 100%;
            border-radius: 100px;
            background: linear-gradient(90deg, #1a4a8a, #4a90d9);
            transition: width 1s ease;
        }

        .confidence-value {
            font-size: 1.4rem;
            font-weight: 600;
            color: #7eb8f7;
            margin-bottom: 32px;
        }

        .back-btn {
            display: inline-block;
            padding: 12px 32px;
            background: #1a4a8a;
            color: #e0f0ff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            transition: background 0.2s;
        }

        .back-btn:hover { background: #2260b0; }
    </style>
</head>
<body>
    <div class="card">
        {% if result == "Confirmed Exoplanet" %}
            <div class="icon"></div>
        {% else %}
            <div class="icon">❌</div>
        {% endif %}

        <p class="result-label">Classification Result</p>
        <p class="result-value {% if result == 'Confirmed Exoplanet' %}confirmed{% else %}false-positive{% endif %}">
            {{ result }}
        </p>

        <p class="confidence-label">Model Confidence</p>
        <div class="confidence-bar-wrap">
            <div class="confidence-bar" style="width: {{ confidence }}%"></div>
        </div>
        <p class="confidence-value">{{ confidence }}%</p>

        <a href="/" class="back-btn">← Analyse Another Object</a>
    </div>
</body>
</html>
